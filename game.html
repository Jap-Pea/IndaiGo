<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IndaiGo Invaders</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="game-page">
    <div class="wrap">
      <canvas id="game" width="700" height="520" aria-label="Mini Blaster"></canvas>

      <div class="hud">
        <span id="score">Score: 0</span> ·
        <span id="lives">Lives: 3</span> ·
        <div class="panel">
          <input id="playerName" class="name" type="text" maxlength="24" placeholder="Enter your name" />
        </div>
        <button id="start" class="btn">Start Game</button>
        <button id="restart" class="btn" hidden>Restart</button>
      </div>

      <div class="scores">
        <h4>🏆 High Scores (Top 5)</h4>
        <ol id="highscores"></ol>
      </div>
    </div>

    <!-- Mobile controls (visible on touch devices) -->
    <div class="mobile-controls" aria-hidden="true">
      <button id="btnLeft"  class="mc-btn">◀</button>
      <button id="btnFire"  class="mc-btn mc-btn--fire">●</button>
      <button id="btnRight" class="mc-btn">▶</button>
    </div>

    <script type="module" src="./game.js"></script>
  </body>
</html>
